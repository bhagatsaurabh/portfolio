name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist

  Content-Delivery:
    name: Content Delivery
    needs: [ Build ]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: "${{ secrets.AWS_ROLE_ARN }}"
          role-session-name: cdrolesession
          aws-region: ap-south-1

      - name: Upload content to S3
        run: |
          BUCKET="${{ secrets.S3_BUCKET_NAME }}"
          for dir in data images models previews spritesheets textures; do
            if [ -d "dist/$dir" ]; then
              echo "Uploading $dir..."
              aws s3 sync dist/$dir s3://$BUCKET/portfolio/$dir --delete
            else
              echo "Skipping $dir (not found)"
            fi
          done

  Deploy-Firebase:
    name: Deploy to Firebase
    needs: [ Build, Content-Delivery ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_SAURABH_BHAGAT_PORTFOLIO }}"
          channelId: live
          projectId: saurabh-bhagat-portfolio

  Cleanup:
    needs: [ Deploy-Firebase ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Delete dist artifacts
        uses: geekyeggo/delete-artifact@v6
        with:
          name: dist
