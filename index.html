<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light dark" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Saurabh Bhagat's Portfolio" />
    <link rel="icon" type="image/webp" href="/favicon.webp" />
    <link rel="manifest" href="/manifest.json" />
    <link
      rel="preload"
      as="image"
      href="%VITE_SB_CDN_URL%/textures/cardboard-flat.webp"
      type="image/webp"
    />
    <script type="module">
      fetch("%VITE_SB_CDN_URL_ICONS%/spritesheets/icons.svg", { priority: "high" }).catch(() => {});
    </script>
    <script defer src="https://acrobatservices.adobe.com/view-sdk/viewer.js"></script>
    <script>
      document.addEventListener("adobe_dc_view_sdk.ready", () => {});
    </script>
    <style>
      html {
        background-color: #dddddd;
        color-scheme: light;
      }
      @media (prefers-color-scheme: dark) {
        html {
          background-color: #313131;
          color-scheme: dark;
        }
      }
    </style>
    <script>
      (function () {
        try {
          const raw = localStorage.getItem("preferences");
          let theme;
          if (raw) {
            theme = JSON.parse(raw)?.theme;
          }
          if (!theme) {
            theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          const root = document.documentElement;
          root.dataset.theme = theme.toLowerCase();
          root.style.backgroundColor = theme.toLowerCase() === "dark" ? "#313131" : "#dddddd";
          root.style.colorScheme = theme.toLowerCase();
        } catch {}
      })();
    </script>
    <title>Saurabh Bhagat</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
